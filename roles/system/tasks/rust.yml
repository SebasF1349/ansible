- name: Install Rustup (arch)
  community.general.pacman:
    name: rustup
    state: latest
  register: pacman
  when: target_distribution == 'arch'

- name: Install Rustup (debian)
  become: true
  ansible.builtin.apt:
    name: rustup
    state: latest
    update_cache: yes
  when: target_distribution == 'debian'

- name: Install Rust
  ansible.builtin.shell:
    cmd: rustup default stable
