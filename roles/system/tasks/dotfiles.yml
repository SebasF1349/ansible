- name: Create Dotfile Symlinks
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    dot_files_dir: "{{ ansible_env.HOME }}/dot_files"
    config_dir: "{{ ansible_env.HOME }}/.config"
    
    file_links:
      - dest: "{{ ansible_env.HOME }}/.bashrc"
        src: "{{ dot_files_dir }}/bash/.bashrc"
      - dest: "{{ ansible_env.HOME }}/.gitconfig"
        src: "{{ dot_files_dir }}/git/.gitconfig"
      - dest: "{{ ansible_env.HOME }}/.vimrc"
        src: "{{ dot_files_dir }}/vim/.vimrc"
      - dest: "{{ config_dir }}/starship.toml"
        src: "{{ dot_files_dir }}/starship/starship.toml"
      - dest: "{{ ansible_env.HOME }}/.xinitrc"
        src: "{{ dot_files_dir }}/.xinitrc"

    dir_links:
      - dest: "{{ config_dir }}/nvim"
        src: "{{ dot_files_dir }}/nvim/"
      - dest: "{{ config_dir }}/wezterm"
        src: "{{ dot_files_dir }}/wezterm/"
      - dest: "{{ config_dir }}/rofi"
        src: "{{ dot_files_dir }}/rofi/"
      - dest: "{{ config_dir }}/dunst"
        src: "{{ dot_files_dir }}/dunst/"
      - dest: "{{ config_dir }}/xdg-desktop-portal"
        src: "{{ dot_files_dir }}/xdg-desktop-portal/"
    
    wayland_links:
      - dest: "{{ config_dir }}/waybar"
        src: "{{ dot_files_dir }}/waybar/"
      - dest: "{{ config_dir }}/sway"
        src: "{{ dot_files_dir }}/sway/"

    hypr_dir_links:
      - dest: "{{ config_dir }}/hypr"
        src: "{{ dot_files_dir }}/hypr/"
      - dest: "{{ config_dir }}/hyprland-autoname-workspaces"
        src: "{{ dot_files_dir }}/hyprland-autoname-workspaces/"

    i3_dir_links:
      - dest: "{{ config_dir }}/i3"
        src: "{{ dot_files_dir }}/i3/"
      - dest: "{{ config_dir }}/picom"
        src: "{{ dot_files_dir }}/picom/"

  tasks:
    - name: Check for Hyprland installation
      ansible.builtin.command: which hyprland
      register: hyprland_check
      failed_when: false
      changed_when: false

    - name: Check for i3 installation
      ansible.builtin.command: which i3
      register: i3_check
      failed_when: false
      changed_when: false

    - name: Combine all active link mappings
      ansible.builtin.set_fact:
        all_links: "{{ file_links + dir_links + 
                       (wayland_links if use_wayland else []) + 
                       (hypr_dir_links if hyprland_check.rc == 0 else []) + 
                       (i3_dir_links if i3_check.rc == 0 else []) }}"

    - name: Create configuration directory if missing
      ansible.builtin.file:
        path: "{{ config_dir }}"
        state: directory
        mode: '0755'

    - name: Create symbolic links for dotfiles
      ansible.builtin.file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: true
        backup: true
      loop: "{{ all_links }}"
