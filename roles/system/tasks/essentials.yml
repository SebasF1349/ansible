- name: Set System Timezone
  become: true
  community.general.timezone:
    name: America/Argentina/Buenos_Aires

- name: Validate target distribution
  ansible.builtin.assert:
    that:
      - target_distribution in ['arch', 'debian']
    fail_msg: "target_distribution must be either 'arch' or 'debian'."

- name: Enable time sync
  become: true
  ansible.builtin.service:
    name: systemd-timesyncd
    state: started
    enabled: true

- name: Avoid installing debug version
  ansible.builtin.lineinfile:
    path: /etc/makepkg.conf
    regexp: "^OPTIONS="
    line: "OPTIONS=(strip docs !libtool !staticlibs emptydirs zipman purge !debug lto)"
  when: target_distribution == 'arch'

- name: Enable color and parallel downloads in pacman.conf
  become: true
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#Color', line: 'Color' }
    - { regexp: '^#ParallelDownloads', line: 'ParallelDownloads = 5' }
  when: target_distribution == 'arch'

- name: Enable eyecandy
  become: true
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    line: "ILoveCandy"
    insertafter: "^\\s*Color$"
    state: present
  when: target_distribution == 'arch'

- name: Update Pacman
  become: true
  community.general.pacman:
    update_cache: true
    upgrade: true
  when: target_distribution == 'arch'

- name: Update Ansible Repo
  ansible.builtin.git:
    repo: git@github.com:SebasF1349/ansible.git
    dest: /home/sebas/ansible
    clone: yes
    update: yes
    accept_hostkey: yes
    key_file: /home/sebas/.ssh/id_ed25519
  when: testing is defined and testing == '1'

- name: Clone or Update Dot Files
  block:
    - name: Check If Dot_files Exists
      ansible.builtin.stat:
        path: /home/sebas/dot_files
      register: dotfiles_dir

    - name: Stash local changes
      ansible.builtin.command:
        cmd: git stash
        chdir: /home/sebas/dot_files
      when: dotfiles_dir.stat.exists and dotfiles_dir.stat.isdir
      register: stash_result
      failed_when: false

    - name: Pull latest code
      ansible.builtin.git:
        repo: git@github.com:SebasF1349/dot_files.git
        dest: /home/sebas/dot_files
        clone: yes
        update: yes
        accept_hostkey: yes
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ ansible_env.HOME }}/.ssh/id_ed25519"

    - name: Re-apply local changes
      ansible.builtin.command:
        cmd: git stash pop
        chdir: /home/sebas/dot_files
      when:
        - dotfiles_dir.stat.exists
        - stash_result is succeeded
        - "'No local changes to save' not in stash_result.stdout"
      failed_when: false

- name: Locate fdfind Executable
  ansible.builtin.command: which fdfind
  register: fdfind_path
  changed_when: false
  when: target_distribution == 'debian'

- name: Ensure ~/.local/bin Exists
  ansible.builtin.file:
    path: ~/.local/bin
    state: directory
    mode: '0755'
  when: target_distribution == 'debian'

- name: Link fdfind to fd
  ansible.builtin.file:
    src: "{{ fdfind_path.stdout }}"
    dest: ~/.local/bin/fd
    state: link
    force: yes
  when: target_distribution == 'debian'

- name: Make link-dotfiles Executable
  ansible.builtin.file:
    path: /home/sebas/dot_files/install_scripts/link-dotfiles.sh
    mode: '0755'
