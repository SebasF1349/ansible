- name: Update Pacman
  community.general.pacman:
    update_cache: true
    upgrade: true

- name: Update Ansible Repo
  git:
    repo: git@github.com:SebasF1349/ansible.git
    dest: /home/sebas/ansible
    clone: yes
    update: yes
    accept_hostkey: yes
    key_file: /home/sebas/.ssh/id_ed25519
  when: testing is defined and testing == '1'

- name: Install Packages with Pacman
  community.general.pacman:
    name: "{{ packages }}"
    state: latest

- name: Clone or Update Dot Files
  git:
    repo: git@github.com:SebasF1349/dot_files.git
    dest: /home/sebas/dot_files
    clone: yes
    update: yes
    accept_hostkey: yes
    key_file: /home/sebas/.ssh/id_ed25519
